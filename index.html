<!DOCTYPE html>
<html>
<head>
  <title>STC Admin</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginPage" class="center">
  <h1>Supreme True Clean</h1>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="loginError"></p>
</div>

<div id="dashboard" class="hidden">
  <div class="sidebar">
    <h2>STC Admin</h2>
    <button onclick="showSection('customers')">Customers</button>
    <button onclick="showSection('leads')">Leads</button>
    <button onclick="showSection('jobs')">Jobs</button>
  </div>

  <div class="content">
    <h1>Dashboard</h1>

    <div id="customers" class="section">
      <h2>Add Customer</h2>
      <input id="c_name" placeholder="Name">
      <input id="c_phone" placeholder="Phone">
      <button onclick="addCustomer()">Save</button>
    </div>

    <div id="leads" class="section hidden">
      <h2>Add Lead</h2>
      <input id="l_name" placeholder="Name">
      <input id="l_phone" placeholder="Phone">
      <button onclick="addLead()">Save</button>
    </div>

    <div id="jobs" class="section hidden">
      <h2>Create Job</h2>
      <input id="j_customer" placeholder="Customer ID">
      <input id="j_price" placeholder="Price">
      <button onclick="createJob()">Save</button>
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
