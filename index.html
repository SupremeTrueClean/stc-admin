<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STC Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADING SPINNER -->
<div id="loading" class="loading">Loading...</div>

<!-- LOGIN -->
<div id="loginBox" class="card center">
    <h1>Supreme True Clean</h1>
    <label for="username">Username</label>
    <input id="username" placeholder="Username" required>
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Password" required>
    <button id="loginBtn">Login</button>
    <p id="msg" class="msg"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
    <div class="topbar">
        <h2>Dashboard</h2>
        <button id="logoutBtn">Logout</button>
    </div>

    <div class="nav">
        <button class="nav-btn" data-section="customers">Customers</button>
        <button class="nav-btn" data-section="leads">Leads</button>
        <button class="nav-btn" data-section="addCustomer">Add Customer</button>
        <button class="nav-btn" data-section="addLead">Add Lead</button>
        <button class="nav-btn" data-section="invoice">Invoices</button>
    </div>

    <!-- CUSTOMER SECTION -->
    <div id="customers" class="section">
        <h3>Customers</h3>
        <button id="refreshCustomers">Refresh</button>
        <div id="customerTable"></div>
    </div>

    <!-- LEADS SECTION -->
    <div id="leads" class="section" style="display:none;">
        <h3>Leads</h3>
        <button id="refreshLeads">Refresh</button>
        <div id="leadTable"></div>
    </div>

    <!-- ADD CUSTOMER SECTION -->
    <div id="addCustomer" class="section" style="display:none;">
        <h3>Add Customer</h3>
        <form id="addCustomerForm">
            <input name="first_name" placeholder="First Name" required>
            <input name="last_name" placeholder="Last Name" required>
            <input name="phone" placeholder="Phone" required>
            <input name="email" placeholder="Email">
            <input name="address" placeholder="Address">
            <input name="city" placeholder="City">
            <input name="state" placeholder="State">
            <input name="zip" placeholder="Zip">
            <input name="service_type" placeholder="Service Type">
            <input name="plan_type" placeholder="Plan Type">
            <input name="frequency" placeholder="Frequency">
            <input name="price" placeholder="Price">
            <button type="submit">Save Customer</button>
        </form>
    </div>

    <!-- ADD LEAD SECTION -->
    <div id="addLead" class="section" style="display:none;">
        <h3>Add Lead</h3>
        <form id="addLeadForm">
            <input name="name" placeholder="Name" required>
            <input name="phone" placeholder="Phone" required>
            <input name="email" placeholder="Email">
            <input name="address" placeholder="Address">
            <input name="city" placeholder="City">
            <input name="state" placeholder="State">
            <input name="zip" placeholder="Zip">
            <input name="assigned_rep" placeholder="Assigned Rep">
            <button type="submit">Save Lead</button>
        </form>
    </div>

    <!-- INVOICE SECTION -->
    <div id="invoice" class="section" style="display:none;">
        <h3>Create Invoice</h3>
        <form id="createInvoiceForm">
            <input name="customer_id" placeholder="Customer ID" required>
            <input name="job_id" placeholder="Job ID">
            <input name="amount" placeholder="Amount" required>
            <button type="submit">Generate Invoice</button>
        </form>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
